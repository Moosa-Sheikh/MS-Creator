kind = "web"
previewPath = "/"
title = "Etsy Mockup Tool"
version = "1.0.0"
id = "artifacts/mockup-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19522

[services.development]
run = "pnpm --filter @workspace/mockup-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mockup-tool", "run", "build" ]
publicDir = "artifacts/mockup-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19522"
BASE_PATH = "/"
